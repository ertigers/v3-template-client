<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <g fill="none" stroke="#070404" stroke-linecap="round" stroke-linejoin="round">
    <!-- 外部圆环：使用 dasharray 产生两个自然断口，整体更粗 -->
    <circle cx="12" cy="12" r="9" stroke-width="1.5" transform="rotate(45 12 12)" stroke-dasharray="44 6 16 6"/>
    <!-- 心电波形：居中、加粗、端点圆角 -->
    <path d="M7.4 12h2.2l1-2.6 2.2 5 1-2.6h2.2" stroke="#070404" stroke-width="1.5"/>
  </g>
</svg>
